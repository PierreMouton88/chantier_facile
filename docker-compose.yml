version: "3.9"

services:
  # 🗄️ Service Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: chantier_facile_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chantier_facile_bdd
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - app-network
    command:
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔧 Service Back NestJS
  back:
    image: ${BACK_IMAGE}
    container_name: chantier_facile_back
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      URL_FRONT: "${URL_FRONT}"
    networks:
      - app-network
      - nginx-network
    depends_on:
      mysql:
        condition: service_healthy

  # ⚛️ Service Front React
  front:
    image: ${FRONT_IMAGE}
    container_name: chantier_facile_front
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - app-network
      - nginx-network
    depends_on:
      - back

  # 🛠️ Service phpMyAdmin (optionnel)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: chantier_facile_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    networks:
      - app-network
      - nginx-network
    depends_on:
      - mysql

networks:
  app-network:
    name: chantier-facile-network
    driver: bridge
  nginx-network:
    external: true

volumes:
  mysqldata:
